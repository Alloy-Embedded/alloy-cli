name: Docs

on:
  push:
    branches: [main]
    paths:
      # Only fire when something docs-relevant changes.  This keeps the
      # workflow off `main` pushes that touch only `src/` / `tests/`.
      # Source changes that affect the auto-generated API reference
      # (docstrings on the allowlisted modules) DO trigger via the
      # `src/alloy_cli/{core,mcp}/**` and `src/alloy_cli/main.py` paths.
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "src/alloy_cli/main.py"
      - "src/alloy_cli/core/**"
      - "src/alloy_cli/mcp/**"
      - "src/alloy_cli/tui/screens/**"
      - "CHANGELOG.md"
      - "README.md"
      - "pyproject.toml"
  push:
    tags: ["v*"]
  workflow_dispatch:
    # Maintainer dry-run / manual republish.

permissions:
  contents: write    # mkdocs gh-deploy needs to push to gh-pages

# Prevent races between a fast `main` push and a slower tag-build
# deploy.  cancel-in-progress means the latest push wins.
concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git-revision-date plugin)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[docs]'

      - name: Build docs (--strict)
        # Strict mode: any unresolved nav / broken link / missing
        # plugin / broken mkdocstrings reference fails the build.
        run: |
          mkdocs build --strict
        env:
          # Suppress the upstream "MkDocs may break support for all
          # existing plugins and themes soon!" notice.
          DISABLE_MKDOCS_2_WARNING: "true"

      - name: Deploy to GitHub Pages
        # Only deploy from main + v* tags + manual dispatch (the
        # workflow's `on:` block already filters those).  The strict
        # build above is the gate — if it fails, this step is skipped
        # by GitHub Actions automatically.
        if: github.event_name != 'pull_request'
        run: |
          # Configure git so mkdocs-deploy can push.
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Push to gh-pages.  --force keeps the gh-pages branch one
          # commit deep (no history bloat).
          mkdocs gh-deploy --force --strict
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Custom domain support: drop a `docs/CNAME` file with the domain
# name (no scheme, no path) when the user registers one.  Material's
# build copies it into site/CNAME automatically; GitHub Pages picks
# it up on the next deploy.  Until then, the site lives at
# https://alloy-embedded.github.io/alloy-cli/.
