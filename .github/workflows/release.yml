name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke test the wheel
        # Install the freshly-built wheel into a clean venv and
        # assert the entry point still works.  Failure blocks the
        # publish step so a broken wheel never lands on PyPI.
        run: |
          python -m venv .release-smoke
          ./.release-smoke/bin/python -m pip install --upgrade pip
          ./.release-smoke/bin/python -m pip install dist/*.whl
          ./.release-smoke/bin/alloy --version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
